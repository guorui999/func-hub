name: hello_greeter
description: Generate a personalized greeting message based on name and language
author: guorui999
entry_point: hello-tool:hello_greeter
source_repo: https://github.com/guorui999/func-hub
source_ref: v1.0.0
dependencies: []
parameters:
  type: object
  properties:
    name:
      type: string
      description: The person's name to greet
    language:
      type: string
      enum: [en, zh, ja, fr, de]
      default: en
      description: Language code for the greeting
  required: [name]
